# GraphVault self-hosted deployment.
#
# Quickstart:
#   cp docker/env.example .env       # then edit secrets
#   docker compose up -d --build
#   curl http://127.0.0.1:4000/v1/health
#
# This brings up the sync server backed by PostgreSQL with durable on-disk
# storage for blob bytes. See docs/deployment.md for first-user creation,
# backups, and the reverse-proxy/TLS model, and docs/hardening.md for the full
# VPS hardening checklist.
#
# TLS NOTE: the server speaks plain HTTP and is meant to sit BEHIND a
# TLS-terminating reverse proxy (Caddy or nginx) in production. Do not expose
# port 4000 directly to the public internet. The commented `proxy` service
# below is a minimal Caddy example — uncomment and adapt it, then stop
# publishing the server's port directly. See docs/deployment.md.
#
# CONTAINER HARDENING: both services run with `no-new-privileges`, drop all
# Linux capabilities, and (for the server) a read-only root filesystem with
# explicit tmpfs/volume mounts for the only paths that must be writable. The
# server process runs as the unprivileged `node` user baked into the image.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    # postgres needs to write its socket dir, lock files, and the data dir; the
    # data dir is a volume, the rest go to tmpfs so the root fs stays read-only.
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # CHOWN/SETUID/SETGID/DAC_OVERRIDE/FOWNER let the entrypoint drop to the
    # `postgres` user and fix data-dir ownership on first init.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-graphvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graphvault}
      POSTGRES_DB: ${POSTGRES_DB:-graphvault}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-graphvault} -d ${POSTGRES_DB:-graphvault}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Defence in depth: no privilege escalation, no Linux capabilities, and a
    # read-only root filesystem. The only writable paths are the data volume
    # (blob bytes) and a small tmpfs for scratch files.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Run as the unprivileged `node` user (uid 1000) shipped in the image,
    # never root, even though the image already drops to it via USER.
    user: '1000:1000'
    environment:
      NODE_ENV: production
      GRAPHVAULT_HOST: 0.0.0.0
      GRAPHVAULT_PORT: '4000'
      # Persisted blob storage lives on the named volume mounted at /data.
      GRAPHVAULT_DATA_DIR: /data
      GRAPHVAULT_STORAGE: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-graphvault}:${POSTGRES_PASSWORD:-graphvault}@db:5432/${POSTGRES_DB:-graphvault}
      # Comma-separated allowed origins for the web client. The startup preflight
      # REFUSES to boot in production if this is '*'; set it to your domain.
      GRAPHVAULT_CORS_ORIGIN: ${GRAPHVAULT_CORS_ORIGIN:-https://notes.example.com}
      # Behind the TLS-terminating proxy: trust X-Forwarded-* (real client IPs +
      # HTTPS detection) and require HTTPS. The preflight refuses to boot in
      # production if REQUIRE_HTTPS is false.
      GRAPHVAULT_TRUST_PROXY: ${GRAPHVAULT_TRUST_PROXY:-true}
      GRAPHVAULT_REQUIRE_HTTPS: ${GRAPHVAULT_REQUIRE_HTTPS:-true}
      # Max blob upload size in bytes (default 64 MiB).
      GRAPHVAULT_MAX_BLOB_BYTES: ${GRAPHVAULT_MAX_BLOB_BYTES:-67108864}
      # Rate limiting (per-client global cap + stricter cap on /v1/auth/*).
      GRAPHVAULT_RATE_LIMIT_MAX: ${GRAPHVAULT_RATE_LIMIT_MAX:-300}
      GRAPHVAULT_RATE_LIMIT_WINDOW: ${GRAPHVAULT_RATE_LIMIT_WINDOW:-60000}
      GRAPHVAULT_AUTH_RATE_LIMIT_MAX: ${GRAPHVAULT_AUTH_RATE_LIMIT_MAX:-10}
      # Optional at-rest blob encryption. A base64-encoded 32-byte key. If unset,
      # blobs are stored as plaintext on disk (the preflight warns). Generate
      # one with:  openssl rand -base64 32
      GRAPHVAULT_ENCRYPTION_KEY: ${GRAPHVAULT_ENCRYPTION_KEY:-}
    volumes:
      - blob-data:/data
    # Sync the Prisma schema into the database before the server boots. The repo
    # ships no migration files (the schema is the source of truth), so we use
    # `db push`, which creates/updates tables directly and is idempotent — safe
    # on every restart. Switch to `migrate deploy` once versioned migrations are
    # committed under apps/server/prisma/migrations. The `prisma` CLI is a
    # (dev)dependency of @graphvault/server, so pnpm places it under
    # apps/server/node_modules.
    command: >
      sh -c "node apps/server/node_modules/prisma/build/index.js db push
      --schema apps/server/prisma/schema.prisma --skip-generate --accept-data-loss
      && node apps/server/dist/index.js"
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:'+(process.env.GRAPHVAULT_PORT||4000)+'/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    ports:
      # Publish only to loopback by default; a reverse proxy should front this.
      # Drop or change this when the `proxy` service below terminates TLS.
      - '127.0.0.1:4000:4000'

  # --- Optional TLS-terminating reverse proxy (uncomment to use) ------------
  # proxy:
  #   image: caddy:2
  #   restart: unless-stopped
  #   depends_on:
  #     - server
  #   security_opt:
  #     - no-new-privileges:true
  #   cap_drop:
  #     - ALL
  #   # Caddy binds 80/443 (privileged ports) and writes certs/config.
  #   cap_add:
  #     - NET_BIND_SERVICE
  #   ports:
  #     - '80:80'
  #     - '443:443'
  #   volumes:
  #     - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  # When enabling the proxy, remove the `ports:` block from `server` above so
  # only the proxy is reachable. A minimal Caddyfile:
  #
  #   notes.example.com {
  #       reverse_proxy server:4000
  #   }

volumes:
  db-data:
  blob-data:
  # caddy-data:
  # caddy-config:
