<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1a1d27"/>
  <!-- Graph nodes -->
  <circle cx="64" cy="20" r="12" fill="#5b6aff"/>
  <circle cx="20" cy="104" r="12" fill="#5b6aff"/>
  <circle cx="108" cy="104" r="12" fill="#5b6aff"/>
  <!-- Edges -->
  <line x1="64"  y1="32"  x2="27"  y2="92"  stroke="#5b6aff" stroke-width="4" stroke-linecap="round"/>
  <line x1="64"  y1="32"  x2="101" y2="92"  stroke="#5b6aff" stroke-width="4" stroke-linecap="round"/>
  <line x1="32"  y1="104" x2="96"  y2="104" stroke="#5b6aff" stroke-width="4" stroke-linecap="round"/>
  <!-- Glow effect via extra translucent circles -->
  <circle cx="64"  cy="20"  r="18" fill="none" stroke="#5b6aff" stroke-width="2" opacity="0.3"/>
  <circle cx="20"  cy="104" r="18" fill="none" stroke="#5b6aff" stroke-width="2" opacity="0.3"/>
  <circle cx="108" cy="104" r="18" fill="none" stroke="#5b6aff" stroke-width="2" opacity="0.3"/>
</svg>
