name: Bug report
description: Report a problem with GraphVault
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please search existing issues first.
        For suspected **security** vulnerabilities, do not file here - see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: surface
    attributes:
      label: Where
      placeholder: 'Web (browser + OS), installed PWA, desktop (Tauri), CLI, extension'
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: 'e.g. v0.1.0 or a commit SHA'
  - type: textarea
    id: context
    attributes:
      label: Console errors / screenshots
      description: Paste any console output or attach screenshots. Redact private data.
  - type: checkboxes
    id: dataloss
    attributes:
      label: Data safety
      options:
        - label: This bug involves possible loss or corruption of my notes (we prioritize these).
