name: Feature request
description: Suggest an idea for GraphVault
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Fits the project's principles
      description: GraphVault is local-first, zero-telemetry, no-lock-in, privacy-first.
      options:
        - label: This keeps note content on-device by default (no new telemetry / forced cloud).
        - label: This keeps data in plain Markdown (no lock-in).
