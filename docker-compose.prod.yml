# docker-compose.prod.yml — Production overlay for GraphVault
#
# Extends docker-compose.yml with:
#   • Caddy reverse proxy (automatic TLS via Let's Encrypt).
#   • Caddy cert/config volumes for persistence across restarts.
#   • server.ports removed (Caddy is the only public ingress).
#   • Production-grade server env vars (trust proxy, require HTTPS).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Required .env keys (in addition to the base docker/env.example set):
#   DOMAIN          — the public hostname, e.g. notes.example.com
#   ACME_EMAIL      — Let's Encrypt registration e-mail (required by ACME)
#   POSTGRES_PASSWORD — strong random password (change from the example default)
#   GRAPHVAULT_CORS_ORIGIN — set to your web-client origin, e.g. https://notes.example.com
#   GRAPHVAULT_ENCRYPTION_KEY — base64-encoded 32-byte AES key (back this up!)
#
# See docs/deployment.md for the full 5-minute deploy walkthrough.

services:

  # ---------------------------------------------------------------------------
  # server — override: drop direct port exposure; enable proxy-trust and HTTPS.
  # ---------------------------------------------------------------------------
  server:
    # Remove the loopback port binding from docker-compose.yml so port 4000 is
    # NOT reachable from the host; only the caddy container can reach it over the
    # internal Docker network.
    ports: !reset []
    environment:
      # Tell Fastify to trust X-Forwarded-For / X-Forwarded-Proto from Caddy so
      # rate-limiting keys on real client IPs, not the proxy address.
      GRAPHVAULT_TRUST_PROXY: "true"
      # Reject plain-HTTP requests (belt-and-suspenders; Caddy never sends them).
      GRAPHVAULT_REQUIRE_HTTPS: "true"

  # ---------------------------------------------------------------------------
  # caddy — TLS-terminating reverse proxy.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3 (QUIC)
    volumes:
      # Caddyfile configuration (read-only inside the container).
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist TLS certificates and ACME account across container restarts.
      - caddy-data:/data
      # Persist Caddy's internal config (enables graceful reloads).
      - caddy-config:/config
    environment:
      # Caddy reads {env.DOMAIN} and {env.ACME_EMAIL} from these vars.
      # Set both in .env before running the production stack.
      DOMAIN: ${DOMAIN:-notes.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default

# ---------------------------------------------------------------------------
# Additional named volumes for Caddy persistence.
# ---------------------------------------------------------------------------
volumes:
  caddy-data:
  caddy-config:
